<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Asset Tracker — 3D Globe Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css" />
    <script src="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@9.0.36/dist.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #eee;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #app {
        display: grid;
        grid-template-rows: 56px 1fr 280px;
        grid-template-columns: 1fr;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px;
        background: #181818;
        border-bottom: 1px solid #2a2a2a;
        position: relative; /* anchor dropdown panels to header */
      }
      header h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 600;
      }

      /* Source dropdown — replaces the inline pill row. */
      .source-dropdown {
        position: relative;
      }
      .source-toggle {
        font-size: 12px;
        padding: 6px 12px;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        background: #1a1a1a;
        color: #ddd;
        cursor: pointer;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .source-toggle:hover { background: #242424; }
      .source-toggle.open { background: #2c4a7a; border-color: #4a7ab0; color: #fff; }
      .source-summary { font-size: 11px; color: #aaa; }
      .source-toggle.open .source-summary { color: #cfe1ff; }
      .caret { font-size: 10px; opacity: 0.7; }
      .source-panel {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        z-index: 1000;
        min-width: 240px;
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      }
      .source-panel-header {
        padding: 10px 14px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        border-bottom: 1px solid #2a2a2a;
      }
      .source-panel-list { margin: 0; padding: 6px 0; list-style: none; max-height: 320px; overflow-y: auto; }
      .source-row {
        display: grid;
        grid-template-columns: 12px 1fr auto auto;
        align-items: center;
        gap: 10px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 12px;
      }
      .source-row:hover { background: #1f1f1f; }
      .source-row .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
      .source-row .source-name { text-transform: uppercase; letter-spacing: 0.04em; color: #ddd; }
      .source-row .source-count { color: #888; font-size: 11px; }
      .source-row .source-state { color: #5fa86a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
      .source-row.off .source-state { color: #6e6e6e; }
      .source-row.off { opacity: 0.65; }

      /* NMEA paste popover — opens from a header button. */
      .nmea-popover {
        position: absolute;
        top: calc(100% + 6px);
        right: 16px;
        z-index: 1000;
        width: 360px;
        background: #161616;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 12px 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      }
      .nmea-popover h3 {
        margin: 0 0 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #aaa;
      }
      .nmea-popover textarea {
        width: 100%;
        min-height: 90px;
        background: #0c0c0c;
        color: #ddd;
        border: 1px solid #2a2a2a;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 11px;
        padding: 6px;
        resize: vertical;
        box-sizing: border-box;
      }
      .nmea-popover .nmea-status {
        font-size: 11px;
        color: #888;
        margin-top: 4px;
      }

      /* Header right-side controls cluster. */
      .header-controls {
        margin-left: auto;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .toggle-btn {
        font-size: 11px;
        padding: 4px 10px;
        border: 1px solid #555;
        border-radius: 4px;
        background: transparent;
        color: #ddd;
        cursor: pointer;
        font-family: inherit;
      }
      .toggle-btn.on {
        background: #2c4a7a;
        border-color: #4a7ab0;
        color: #fff;
      }

      /* Map fills the middle row. */
      #mapContainer {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
      }
      #mapContainer .maplibregl-map,
      #mapContainer canvas {
        width: 100%;
        height: 100%;
      }
      #boot-error {
        position: absolute;
        inset: 16px;
        padding: 16px;
        background: #1a0e0e;
        border: 1px solid #5a2a2a;
        color: #ffb6b6;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 12px;
        white-space: pre-wrap;
        overflow: auto;
        display: none;
      }

      /* 3-column asset grid pinned to the bottom row. */
      #assetGrid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        background: #131313;
        border-top: 1px solid #2a2a2a;
        overflow: hidden;
      }
      #assetGrid > .asset-sidebar {
        overflow-y: auto;
        border-right: 1px solid #1f1f1f;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      #assetGrid > .asset-sidebar:last-child { border-right: none; }

      .sidebar-header {
        padding: 10px 14px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        border-bottom: 1px solid #2a2a2a;
        flex-shrink: 0;
      }
      .sidebar-header h2 {
        margin: 0;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #aaa;
      }
      .sidebar-count {
        font-size: 11px;
        color: #888;
      }
      .sidebar-toolbar {
        padding: 8px 14px;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        gap: 6px;
        align-items: center;
        flex-shrink: 0;
      }
      .asset-search {
        flex: 1;
        background: #0c0c0c;
        color: #ddd;
        border: 1px solid #2a2a2a;
        padding: 5px 8px;
        font-family: inherit;
        font-size: 11px;
      }
      .sidebar-export {
        display: flex;
        gap: 4px;
      }
      .export-btn {
        font-size: 10px;
        padding: 4px 8px;
        border: 1px solid #444;
        background: #1a1a1a;
        color: #ddd;
        cursor: pointer;
        border-radius: 3px;
        font-family: inherit;
      }
      .export-btn:hover { background: #242424; }
      .asset-list {
        margin: 0;
        padding: 0;
        list-style: none;
        flex: 1;
        overflow-y: auto;
      }
      .asset-row {
        padding: 8px 14px;
        border-bottom: 1px solid #1f1f1f;
        cursor: pointer;
      }
      .asset-row:hover { background: #1c1c1c; }
      .asset-row.selected { background: #243854; }
      .asset-label { font-weight: 600; font-size: 13px; }
      .asset-meta {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: #888;
        margin-top: 2px;
      }
      .asset-source {
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Asset Tracker — 3D Globe</h1>
        <div id="badges"></div>
        <div class="header-controls">
          <button id="nmeaToggle" class="toggle-btn" type="button">NMEA paste</button>
          <button id="trailsToggle" class="toggle-btn on" type="button">Trails</button>
          <button id="terrainToggle" class="toggle-btn" type="button">Terrain-clamp ground</button>
          <button id="lightingToggle" class="toggle-btn" type="button">Sun lighting</button>
          <button id="followToggle" class="toggle-btn" type="button">Follow selected</button>
        </div>
        <div id="nmeaPopover" class="nmea-popover" hidden>
          <h3>NMEA paste — live parse</h3>
          <textarea id="nmeaInput" placeholder="$GPGGA,123519,4807.038,N,01131.000,E,1,08,0.9,545.4,M,46.9,M,,*47&#10;$GPRMC,123519,A,4807.038,N,01131.000,E,022.4,084.4,230394,003.1,W*6A"></textarea>
          <div class="nmea-status" id="nmeaStatus">Paste GGA + RMC sentences to add a live asset.</div>
        </div>
      </header>
      <div id="mapContainer">
        <div id="boot-error"></div>
      </div>
      <div id="assetGrid">
        <div id="airAssets"></div>
        <div id="vehicleAssets"></div>
        <div id="personAssets"></div>
      </div>
    </div>

    <script type="module">
      // Surface any module-load or runtime error on the page itself —
      // otherwise the demo just goes blank and only DevTools sees it.
      window.addEventListener('error', (e) => {
        const el = document.getElementById('boot-error');
        if (!el) return;
        el.style.display = 'block';
        el.textContent = `[boot error] ${e.message}\n${e.error && e.error.stack ? e.error.stack : ''}`;
      });
      window.addEventListener('unhandledrejection', (e) => {
        const el = document.getElementById('boot-error');
        if (!el) return;
        el.style.display = 'block';
        el.textContent = `[unhandled rejection] ${e.reason && (e.reason.stack || e.reason.message || e.reason)}`;
      });

      import { config } from './config.js';
      import { buildRegistry } from './src/registry.js';
      import { adsbAdapter } from './src/adapters/adsb.js';
      import { trootraxAdapter } from './src/adapters/trootrax.js';
      import { customAdapter } from './src/adapters/custom.js';
      import { nmeaAdapter } from './src/adapters/nmea.js';
      import { traccarAdapter } from './src/adapters/traccar.js';
      import { aprsAdapter } from './src/adapters/aprs.js';
      import { samsaraAdapter } from './src/adapters/samsara.js';
      import { aisAdapter } from './src/adapters/ais.js';
      import { inreachAdapter } from './src/adapters/inreach.js';
      import { makeMqttAdapter } from './src/adapters/mqtt.js';
      import { geojsonAdapter } from './src/adapters/geojson.js';
      import { createMap, setSunLighting } from './src/map/map.js';
      import { EntityStore } from './src/map/entities.js';
      import { CameraController } from './src/map/camera.js';
      import { Sidebar } from './src/ui/sidebar.js';
      import { SourceBadges } from './src/ui/badges.js';
      import { toGeoJSON, toCSV, downloadBlob } from './src/ui/export.js';

      // Demo MQTT adapter — covers a generic IoT device shape.
      // canParse always returns false, so payloads must be routed by calling
      // mqttDemoAdapter.normalize() directly (or registry.parse() will skip it).
      const mqttDemoAdapter = makeMqttAdapter({
        idField: 'device_id',
        latField: 'gps.lat',
        lonField: 'gps.lon',
        altitudeField: 'gps.alt_m',
        headingField: 'course',
        speedField: 'speed_mph',
        timestampField: 'ts_ms',
        altitudeUnit: 'meters',
        speedUnit: 'mph',
        timestampUnit: 'milliseconds',
        name: 'mqtt',
        labelField: 'name',
      });

      const registry = buildRegistry({
        adapters: [
          adsbAdapter,
          trootraxAdapter,
          traccarAdapter,
          aprsAdapter,
          samsaraAdapter,
          inreachAdapter,
          nmeaAdapter,
          aisAdapter,
          geojsonAdapter,
          mqttDemoAdapter,
          customAdapter,
        ],
        colors: config.sourceColors,
      });

      const map = createMap('mapContainer');
      const store = new EntityStore(map, registry);
      const camera = new CameraController(map, store);

      // Source → category lookup, with 'vehicle' as the catch-all default.
      function categoryOf(source) {
        return (config.categories && config.categories[source]) || 'vehicle';
      }

      function exportHandler(format, positions) {
        if (format === 'geojson') {
          downloadBlob(JSON.stringify(toGeoJSON(positions), null, 2), 'assets.geojson', 'application/geo+json');
        } else {
          downloadBlob(toCSV(positions), 'assets.csv', 'text/csv');
        }
      }

      // Three sidebars, one per category, side-by-side at the bottom.
      const airSidebar = new Sidebar(document.getElementById('airAssets'), {
        title: 'Air assets',
        filter: (p) => categoryOf(p.source) === 'air',
        onSelect: (id) => camera.selectAsset(id),
        onExport: exportHandler,
      });
      const vehicleSidebar = new Sidebar(document.getElementById('vehicleAssets'), {
        title: 'Vehicles',
        filter: (p) => categoryOf(p.source) === 'vehicle',
        onSelect: (id) => camera.selectAsset(id),
        onExport: exportHandler,
      });
      const personSidebar = new Sidebar(document.getElementById('personAssets'), {
        title: 'Persons',
        filter: (p) => categoryOf(p.source) === 'person',
        onSelect: (id) => camera.selectAsset(id),
        onExport: exportHandler,
      });
      const sidebars = [airSidebar, vehicleSidebar, personSidebar];

      function refreshSidebars() {
        const all = store.all();
        for (const sb of sidebars) sb.render(all);
      }

      const badges = new SourceBadges(document.getElementById('badges'), registry, {
        onToggle: (source, visible) => store.setSourceVisible(source, visible),
      });

      // Seed demo data — the four existing adapters, exercised end-to-end.
      // TrooTrax helicopters at realistic Wasatch Range altitudes (~4,750–5,320 ft MSL).
      // Wasatch peaks reach ~11,750 ft (Mt Timpanogos). Helicopter cruise
      // for backcountry / utility ops in this terrain is typically 9-13k ft
      // MSL — high enough to clear ridgelines, low enough to be useful.
      const seedTrootrax = {
        feed: 'trootrax',
        assets: [
          { tailNumber: 'N251HC', latitude: 40.6125, longitude: -111.5582, altitudeFeet: 12500, headingDeg: 305, groundSpeedKts: 95,  lastReportUtc: nowIso() },
          { tailNumber: 'N512HC', latitude: 40.5588, longitude: -111.6442, altitudeFeet: 11800, headingDeg: 92,  groundSpeedKts: 110, lastReportUtc: nowIso() },
          { tailNumber: 'N731HC', latitude: 40.7115, longitude: -111.9322, altitudeFeet: 9500,  headingDeg: 187, groundSpeedKts: 120, lastReportUtc: nowIso() },
        ],
      };

      const seedAdsb = {
        now: Date.now() / 1000,
        messages: 1,
        aircraft: [
          { hex: 'a1b2c3', flight: 'DAL123  ', lat: 40.7126, lon: -111.9342, alt_baro: 35000, alt_geom: 35150, gs: 420, track: 273, seen_pos: 0.4, seen: 0.1 },
          { hex: 'a99001', flight: 'SWA422  ', lat: 40.45, lon: -112.05, alt_baro: 28000, alt_geom: 28080, gs: 380, track: 95, seen_pos: 0.2, seen: 0.1 },
        ],
      };

      const seedCustom = {
        source: 'custom',
        points: [
          { id: 'GROUND-1', name: 'Recovery Truck', lat: 40.65, lon: -111.7, alt: 4800, hdg: 45, spd: 35, ts: Date.now() / 1000 },
        ],
      };

      // Seed Traccar — two ground vehicles via REST positions array.
      const seedTraccar = [
        { deviceId: 12, deviceName: 'Truck 12', latitude: 40.62, longitude: -111.8, altitude: 1480, speed: 28, course: 90,  fixTime: nowIso(), valid: true, attributes: { ignition: true, battery: 87 } },
        { deviceId: 13, deviceName: 'Sedan 13', latitude: 40.59, longitude: -111.78, altitude: 1455, speed: 0,  course: 0,   fixTime: nowIso(), valid: true, attributes: { ignition: false, battery: 92 } },
      ];

      // Seed APRS — one mobile ham asset via aprs.fi REST shape.
      const seedAprs = {
        result: 'ok',
        entries: [
          { name: 'K7XYZ-9', srccall: 'K7XYZ', lat: '40.64', lng: '-111.78', course: 270, speed: 65, altitude: 1450, time: Date.now() / 1000, lasttime: Date.now() / 1000, symbol: '/>' },
        ],
      };

      // Seed Samsara — fleet vehicle via snapshot envelope.
      const seedSamsara = {
        data: [
          { id: '281474976737697', name: 'F-150 — Truck 7', vin: '1FTFW1ET5DFC10312', make: 'Ford', model: 'F-150', tags: [],
            location: { latitude: 40.6, longitude: -111.85, headingDegrees: 87, speedMilesPerHour: 41.5, time: nowIso() } },
        ],
        pagination: { endCursor: 'demo', hasNextPage: false },
      };

      // Seed inReach — IPC Outbound envelope, two field operatives.
      const seedInreach = {
        Version: '2.0',
        Events: [
          { imei: '300434061234567', messageCode: 0, timeStamp: Date.now(),
            point: { latitude: 40.66, longitude: -111.6, altitude: 2050, speed: 12, course: 270 } },
          { imei: '300434061234568', messageCode: 1, timeStamp: Date.now(),
            point: { latitude: 40.55, longitude: -111.95, altitude: 1980, speed: 0, course: 0 } },
        ],
      };

      // Seed AIS — gpsd reference Type 1 (MMSI 477553000 near Seattle).
      const seedAis =
        '!AIVDM,1,1,,B,177KQJ5000G?tO`K>RA1wUbN0TKH,0*5C\n' +
        '!AIVDM,1,1,,A,B6CdCm0t3`tba35f@V9faHi7kP06,0*58';

      // Seed MQTT — generic IoT device payload routed via the explicit
      // mqttDemoAdapter (canParse is always false on MQTT adapters).
      const mqttPositions = mqttDemoAdapter.normalize({
        device_id: 'iot-pod-9',
        name: 'IoT Pod 9',
        gps: { lat: 40.58, lon: -111.72, alt_m: 1500 },
        course: 135,
        speed_mph: 18,
        ts_ms: Date.now(),
      });

      // Seed GeoJSON — third-party-style FeatureCollection (Gaia/Garmin shape).
      const seedGeoJson = {
        type: 'FeatureCollection',
        features: [
          {
            type: 'Feature',
            id: 'wp-park',
            geometry: { type: 'Point', coordinates: [-111.61, 40.5, 1500] },
            properties: { name: 'Field HQ', time: nowIso() },
          },
        ],
      };

      const all = [
        ...registry.parse(seedTrootrax),
        ...registry.parse(seedAdsb),
        ...registry.parse(seedCustom),
        ...registry.parse(seedTraccar),
        ...registry.parse(seedAprs),
        ...registry.parse(seedSamsara),
        ...registry.parse(seedInreach),
        ...registry.parse(seedAis),
        ...registry.parse(seedGeoJson),
        ...mqttPositions,
      ];

      store.updateMapPositions(all);
      refreshSidebars();
      badges.render(store.countBySource());

      // Marker clicks bubble up via EntityStore.setSelected (called from
      // the layer's onClick handler). We mirror the highlight in the
      // sidebar columns by listening through a render pass.
      const _origSetSelected = store.setSelected.bind(store);
      store.setSelected = (id) => {
        _origSetSelected(id);
        document.querySelectorAll('#assetGrid .asset-row').forEach((row) => {
          row.classList.toggle('selected', row.dataset.id === id);
        });
      };

      // Trails toggle.
      const trailsBtn = document.getElementById('trailsToggle');
      trailsBtn.addEventListener('click', () => {
        const on = trailsBtn.classList.toggle('on');
        store.setTrailsVisible(on);
      });

      // Terrain-clamp ground sources toggle (traccar / samsara / custom).
      const terrainBtn = document.getElementById('terrainToggle');
      // Reflect the default state — these sources clamp by default.
      terrainBtn.classList.add('on');
      terrainBtn.addEventListener('click', () => {
        const on = terrainBtn.classList.toggle('on');
        for (const source of ['traccar', 'samsara', 'custom']) {
          store.setTerrainFollow(source, on);
        }
      });

      // Sun lighting + atmosphere toggle.
      const lightingBtn = document.getElementById('lightingToggle');
      if (config.enableSunLighting) lightingBtn.classList.add('on');
      lightingBtn.addEventListener('click', () => {
        const on = lightingBtn.classList.toggle('on');
        setSunLighting(map, on);
      });

      // Follow toggle — locks camera onto the currently-selected entity.
      // Press Escape (or click again) to release.
      const followBtn = document.getElementById('followToggle');
      followBtn.addEventListener('click', () => {
        const id = store.selectedId;
        if (!id) {
          followBtn.classList.remove('on');
          return;
        }
        const isFollowing = camera.toggleFollow(id);
        followBtn.classList.toggle('on', isFollowing);
      });
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') followBtn.classList.remove('on');
      });

      // Live polling demo — re-fetch a synthetic ADS-B "feed" every 5s and
      // jitter positions slightly so the trail history is visible.
      registry.poll(
        () => ({
          now: Date.now() / 1000,
          messages: 1,
          aircraft: [
            {
              hex: 'a1b2c3',
              flight: 'DAL123  ',
              lat: 40.7126 + (Math.random() - 0.5) * 0.01,
              lon: -111.9342 + (Math.random() - 0.5) * 0.01,
              alt_baro: 35000,
              alt_geom: 35150,
              gs: 420,
              track: 273,
              seen_pos: 0.4,
              seen: 0.1,
            },
          ],
        }),
        5000,
        (positions) => {
          store.updateMapPositions(positions);
          refreshSidebars();
          badges.render(store.countBySource());
        },
      );

      // NMEA paste popover — toggled from the header button. Closes on
      // outside click or Escape.
      const nmeaBtn = document.getElementById('nmeaToggle');
      const nmeaPopover = document.getElementById('nmeaPopover');
      function setNmeaOpen(open) {
        nmeaPopover.hidden = !open;
        nmeaBtn.classList.toggle('on', open);
      }
      nmeaBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        setNmeaOpen(nmeaPopover.hidden);
      });
      document.addEventListener('click', (e) => {
        if (!nmeaPopover.hidden && !nmeaPopover.contains(e.target) && e.target !== nmeaBtn) {
          setNmeaOpen(false);
        }
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !nmeaPopover.hidden) setNmeaOpen(false);
      });

      // NMEA paste — re-parse on every keystroke.
      const nmeaInput = document.getElementById('nmeaInput');
      const nmeaStatus = document.getElementById('nmeaStatus');
      nmeaInput.addEventListener('input', () => {
        nmeaAdapter.reset();
        const positions = registry.parse({
          source: 'nmea',
          deviceId: 'paste-demo',
          sentences: nmeaInput.value,
        });
        if (positions.length === 0) {
          nmeaStatus.textContent = 'Waiting for a complete GGA + RMC pair…';
          return;
        }
        store.updateMapPositions(positions);
        refreshSidebars();
        badges.render(store.countBySource());
        const last = positions[positions.length - 1];
        nmeaStatus.textContent = `Live: ${last.lat.toFixed(4)}, ${last.lon.toFixed(4)}${last.altitude !== null ? ` @ ${Math.round(last.altitude)} ft` : ''}.`;
      });

      function nowIso() {
        return new Date().toISOString();
      }
    </script>
  </body>
</html>
